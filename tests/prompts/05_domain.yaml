        HOW TO DEPLOY A MICROSERVICE

        Prerequisites:
        - Docker installed
        - kubectl configured
        - Access to container registry

        Step 1: Build the Docker image
          docker build -t myapp:v1.0.0 .

        Step 2: Push to registry
          docker push registry.example.com/myapp:v1.0.0

        Step 3: Update Kubernetes manifest
          kubectl set image deployment/myapp myapp=registry.example.com/myapp:v1.0.0

        Step 4: Verify deployment
          kubectl rollout status deployment/myapp

        Step 5: Check health endpoint
          curl https://myapp.example.com/health

        IMPORTANT: If the health check fails, rollback immediately using:
          kubectl rollout undo deployment/myapp

