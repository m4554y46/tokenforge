version: "3.9"

services:
  api:
    build: .
    ports:
      - "8765:8765"
    environment:
      - DATABASE_URL=postgresql://tokenforge:tokenforge@postgres:5432/tokenforge
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=change-me-in-production
    depends_on:
      - postgres
      - redis
      - qdrant

  portal:
    build:
      context: ./portal
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tokenforge
      POSTGRES_PASSWORD: tokenforge
      POSTGRES_DB: tokenforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata:
