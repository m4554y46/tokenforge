        function processData({ users, config }) {
          return users
            .filter(u => u.active && u.role !== 'admin')
            .map(u => ({
              id: u.id,
              fullName: ${u.firstName} ,
              permissions: config.features[u.role] || []
            }))
            .reduce((acc, u) => { acc[u.id] = u; return acc; }, {});
        }

